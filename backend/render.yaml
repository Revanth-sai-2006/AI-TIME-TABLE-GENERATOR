services:
  - type: web
    name: amis-timetable-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is set automatically by Render — do NOT override it here
      # Set these in the Render dashboard (keep secret):
      # MONGODB_URI
      # JWT_SECRET
      # JWT_REFRESH_SECRET
      # GEMINI_API_KEY
      # CLIENT_ORIGIN   ← your Vercel frontend URL e.g. https://your-app.vercel.app
      # EMAIL_USER         ← your Gmail address e.g. you@gmail.com
      # EMAIL_APP_PASSWORD ← Gmail App Password (16-char, from myaccount.google.com/apppasswords)
      # RESEND_API_KEY     ← optional fallback; only useful if you have a verified Resend domain
